name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Sanity-check that both client and server build before we touch Railway.
  # If either fails, the deploy job is skipped and we get a clear failure
  # right in the GitHub PR/commit view.
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: server/go.sum

      - name: Build Go server
        working-directory: server
        run: go build ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build Next.js client
        working-directory: client
        run: npm run build

  deploy:
    name: Deploy to Railway
    needs: verify
    runs-on: ubuntu-latest
    # Only deploy from main, never from forks/PRs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ vars.RAILWAY_SERVICE || 'space-tag' }}" --ci
